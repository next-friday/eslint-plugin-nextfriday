name: Changeset Version Validation

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-changeset:
    name: Validate Changeset
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      ${{
        github.event.pull_request.draft == false
        && !startsWith(github.head_ref, 'changeset-release/')
      }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Changes
        id: changes
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA".."$HEAD_SHA")
          CODE_CHANGES=$(echo "$CHANGED_FILES" | grep -E '^(src|docs)/' | grep -v '__tests__' || true)
          PACKAGE_JSON_CHANGED=$(echo "$CHANGED_FILES" | grep -E '^package\.json$' || true)
          CHANGELOG_CHANGED=$(echo "$CHANGED_FILES" | grep -E '^CHANGELOG\.md$' || true)
          CHANGESET_CHANGES=$(echo "$CHANGED_FILES" | grep -E '^\.changeset/.*\.md$' || true)

          VERSION_FIELD_CHANGED=false
          if [ -n "$PACKAGE_JSON_CHANGED" ]; then
            if git diff "$BASE_SHA".."$HEAD_SHA" -- package.json | grep -E '^[+-][[:space:]]*"version":' > /dev/null; then
              VERSION_FIELD_CHANGED=true
            fi
          fi

          if [ "$VERSION_FIELD_CHANGED" = "true" ] || [ -n "$CHANGELOG_CHANGED" ]; then
            VERSION_CHANGES=true
          else
            VERSION_CHANGES=false
          fi

          echo "code=$([ -n "$CODE_CHANGES" ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "version=$VERSION_CHANGES" >> $GITHUB_OUTPUT
          echo "changeset=$([ -n "$CHANGESET_CHANGES" ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Check Version Changes Authorization
        if: ${{ steps.changes.outputs.version == 'true' }}
        run: |
          echo "Manual version changes not allowed. Add a changeset: pnpm changeset"
          exit 1

      - name: Check Changeset Requirement
        if: ${{ steps.changes.outputs.code == 'true' && steps.changes.outputs.changeset == 'false' }}
        run: |
          echo "Code changes require a changeset. Run: pnpm changeset"
          exit 1
